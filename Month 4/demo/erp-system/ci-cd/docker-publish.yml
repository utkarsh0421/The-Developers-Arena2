name: CI - Build, Dockerize and Publish

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build
        run: mvn -B -DskipTests package -pl erp-api -am
      - name: Build Docker image
        run: echo "Placeholder: build and push Docker image using registry credentials from secrets"

