server:
  port: 8080

spring:
  application:
    name: erp-api
  datasource:
    url: jdbc:h2:mem:erpdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}

erp:
  environment: dev

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
